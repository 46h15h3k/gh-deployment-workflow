name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - index.html   # Only trigger when index.html is changed

# Grant the workflow the permissions it needs to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time; skip queued runs but don't cancel in-progress ones
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Upload the entire repo root (includes index.html)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
